services:
  keroagile:
    build: .
    image: keroagile:latest
    # Default command is 'mcp' (stdio — not useful in compose).
    # Override for CLI or API usage:
    #   docker compose run keroagile task list
    #   docker compose run keroagile serve
    command: ["mcp"]
    environment:
      KEROAGILE_DATA_DIR: /data
    volumes:
      - keroagile-data:/data
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Optional: browser-accessible TUI via ttyd (port 7433)
  # docker compose --profile browser up
  keroagile-browser:
    build:
      context: .
      dockerfile: Dockerfile.ttyd
    image: keroagile-ttyd:latest
    profiles: ["browser"]
    environment:
      KEROAGILE_DATA_DIR: /data
    volumes:
      - keroagile-data:/data
    ports:
      - "7433:7433"
    restart: unless-stopped

volumes:
  keroagile-data:
